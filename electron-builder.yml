appId: com.capfinanzas.app
productName: Cap Finanzas
directories:
  output: release
files:
  - dist/**/*
  - electron/**/*
  - package.json
win:
  icon: public/icon-final.ico
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Cap Finanzas"
  installerIcon: public/icon-final.ico
  uninstallerIcon: public/icon-final.ico
  include: electron/installer.nsh
