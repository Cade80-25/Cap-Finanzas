appId: com.capfinanzas.app
productName: Cap Finanzas
directories:
  output: release
files:
  - dist/**/*
  - electron/**/*
  - package.json
win:
  target:
    - nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Cap Finanzas"
  include: electron/installer.nsh
