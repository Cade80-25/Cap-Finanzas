appId: com.capfinanzas.app
productName: Cap Finanzas
directories:
  output: release
files:
  - dist/**/*
  - electron/**/*
  - package.json
win:
  target:
    - nsis
  icon: build/icon.ico
mac:
  target:
    - dmg
    - zip
  icon: build/icon.png
  category: public.app-category.finance
linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png
  category: Finance
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Cap Finanzas"
  include: electron/installer.nsh
